<script>
// ============ 1. CONSTANTS & UTILITIES ============
const PHYSICS = { ATTRACTION: 0.000065, DAMPING: 0.984, VELOCITY_DAMPING: 1.5 };
const SIZES = { MIN_R: 26, MAX_R: 122, PAD: 8 };
const REFRESH_MS = 60000;

function formatCurrency(n) {
  if (!Number.isFinite(n) || n === 0) return '--';
  if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
  if (n >= 1) return '$' + n.toFixed(4);
  return '$' + n.toFixed(8);
}

function formatCompact(n) {
  if (!Number.isFinite(n)) return '--';
  return new Intl.NumberFormat('en-US', { notation: 'compact', maximumFractionDigits: 2 }).format(n);
}

function formatPercent(v) {
  const num = Number(v || 0);
  return (num > 0 ? '+' : '') + num.toFixed(2) + '%';
}

function formatAddr(a) {
  return a ? a.slice(0, 8) + '...' + a.slice(-6) : '--';
}

function getColor(v) {
  return Number(v || 0) >= 0 ? '#00FF66' : '#FF2255';
}

function debounce(fn, delay) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), delay);
  };
}

  static async fetchPair(pair, signal) {
    try {
      const r = await fetch(`https://api.dexscreener.com/latest/dex/pairs/solana/${pair.pairId}`, { signal });
      const j = await r.json();
      const p = j.pairs?.[0];
      if (!p?.baseToken?.symbol) return null;
      return DexAPI.mapPair(p, pair.logo);
    } catch (e) {
      if (e.name !== 'AbortError') console.warn('Fetch pair failed', e);
      return null;
    }
  }

  static async searchDex(term, signal) {
    try {
      const r = await fetch(`https://api.dexscreener.com/latest/dex/search/?q=${encodeURIComponent(term)}`, { signal });
      const j = await r.json();
      return Array.isArray(j.pairs) ? j.pairs : [];
    } catch (e) {
      if (e.name !== 'AbortError') console.warn('Dex search failed', e);
      return [];
    }
  }

  /** Public helper to map a raw pair object into a token object */
  static mapPair(p, logo = '') {
    const ws = p.info?.websites || [];
    const ss = p.info?.socials || [];
    const xs = ss.find(s => s.type === "twitter");
    return {
      tokenMint: p.baseToken.address,
      pairId: p.pairAddress,
      ticker: p.baseToken.symbol || '?',
      name: p.baseToken.name || '',
      price: Number(p.priceUsd || 0),
      change24: Number(p.priceChange?.h24 || 0),
      change6: Number(p.priceChange?.h6 || 0),
      change1: Number(p.priceChange?.h1 || 0),
      volume24: Number(p.volume?.h24 || 0),
      liquidity: Number(p.liquidity?.usd || 0),
      fdv: Number(p.fdv || 0),
      mcap: Number(p.marketCap || 0),
      txns24: Number((p.txns?.h24?.buys || 0) + (p.txns?.h24?.sells || 0)),
      pairUrl: p.url || '',
      logo: logo || p.info?.imageUrl || '',
      xUrl: xs?.url || '',
      webUrl: ws[0]?.url || '',
      rankScore: 0
    };
  }
}

// ============ 3. TOKEN DATA MANAGER ============
class TokenManager {
  constructor() {
    this.tokens = [];
    this.selectedId = null;
    this.period = localStorage.getItem('sleepPeriod') || '24';
    this.loaded = false;
  }

  getPeriod() { return this.period; }

  setPeriod(val) {
    this.period = val;
    localStorage.setItem('sleepPeriod', val);
  }

  async loadTokens(signal) {
    updateStatus('🌙 Scanning DexScreener for Bags.fm contracts...');
    try {
      const searches = await Promise.all([
        DexAPI.searchDex('bags', signal),
        DexAPI.searchDex('bags.fm', signal),
        DexAPI.searchDex('solana bags', signal)
      ]);
      const map = new Map();
      searches.flat().forEach(p => {
        if (p.chainId !== 'solana' || !p.baseToken?.address) return;
        if (!p.baseToken.address.toLowerCase().endsWith('bags')) return;
        const existing = map.get(p.baseToken.address);
        const newToken = DexAPI.mapPair(p, '');   // public call
        const score = (newToken.mcap || newToken.fdv || 0) + newToken.volume24;
        if (!existing || score > (existing.mcap || existing.fdv || 0) + existing.volume24) {
          map.set(p.baseToken.address, newToken);
        }
      });
      let dyn = map.size ? this.#scoreArray(Array.from(map.values())).filter(t => (t.mcap || t.fdv) >= 25000) : [];
      dyn = dyn.sort((a, b) => b.rankScore - a.rankScore).slice(0, 15);
      if (dyn.length >= 5) {
        updateStatus(`✅ Live: ${dyn.length} Bags.fm coins discovered · auto-refresh 60s`);
        return dyn;
      }
    } catch (e) {
      console.warn('Dynamic search failed, falling back', e);
    }
    updateStatus('📡 Loading known Bags.fm pairs...');
    const results = await Promise.allSettled(DexAPI.FALLBACK.map(p => DexAPI.fetchPair(p, signal)));  // public FALLBACK
    const fallback = results.filter(r => r.status === 'fulfilled' && r.value).map(r => r.value);
    const scored = this.#scoreArray(fallback).sort((a, b) => b.rankScore - a.rankScore);
    updateStatus(`✅ ${scored.length} Bags.fm coins loaded · auto-refresh every 60s`);
    return scored;
  }

  #scoreArray(arr) {
    const maxMC = d3.max(arr, d => d.mcap || d.fdv || 0) || 1;
    const maxVol = d3.max(arr, d => d.volume24 || 0) || 1;
    const maxLiq = d3.max(arr, d => d.liquidity || 0) || 1;
    return arr.map(t => {
      t.rankScore = Math.sqrt((t.mcap || t.fdv || 0) / maxMC) * 0.5 + Math.sqrt((t.volume24 || 0) / maxVol) * 0.35 + Math.sqrt((t.liquidity || 0) / maxLiq) * 0.15;
      return t;
    });
  }

  selectToken(id) {
    if (this.tokens.some(t => t.pairId === id)) {
      this.selectedId = id;
      localStorage.setItem('sleepSelectedId', id);
      return true;
    }
    return false;
  }

  getSelected() {
    return this.tokens.find(t => t.pairId === this.selectedId) || this.tokens[0] || null;
  }

  getChange(token) {
    return Number(token['change' + this.period] || 0);
  }
}

// ============ 4. RENDERING ENGINE ============
class Renderer {
  constructor(container, svgEl, manager) {
    this.container = container;
    this.svg = d3.select(svgEl);
    this.manager = manager;
    this.node = null;
    this.mouse = { x: container.clientWidth/2, y: container.clientHeight/2 };
    this.W = container.clientWidth;
    this.H = container.clientHeight;
    this.initSizes();
  }

  initSizes() {
    const mobile = window.innerWidth <= 900;
    this.minR = mobile ? 17 : 26;
    this.maxR = mobile ? 76 : 122;
    this.pad = mobile ? 10 : 8;
  }

  recalcRadius() {
    const tokens = this.manager.tokens;
    if (!tokens.length) return;
    const area = Math.max(this.W * this.H * 0.65, 1);
    const maxCh = d3.max(tokens, d => Math.abs(this.manager.getChange(d))) || 1;
    const maxScore = d3.max(tokens, d => d.rankScore) || 1;
    const weights = tokens.map(t => {
      const sw = Math.pow(Math.max(t.rankScore / maxScore, 0.01), 1.2);
      const cw = Math.abs(this.manager.getChange(t)) / maxCh;
      return sw * 0.2 + cw * 0.8 + 0.02;
    });
    const sum = d3.sum(weights);
    tokens.forEach((t, i) => {
      t.r = Math.sqrt((weights[i] / sum) * area / Math.PI);
      t.r = Math.max(this.minR, Math.min(this.maxR, t.r));
    });
  }

  runSimulation() {
    const tokens = this.manager.tokens;
    const sim = d3.forceSimulation(tokens)
      .force('x', d3.forceX(this.W/2).strength(0.09))
      .force('y', d3.forceY(this.H/2).strength(0.09))
      .force('collide', d3.forceCollide(d => d.r + this.pad))
      .stop();
    for (let i = 0; i < 500; i++) sim.tick();
    tokens.forEach(t => {
      t.x = Math.max(t.r, Math.min(this.W - t.r, t.x || this.W/2));
      t.y = Math.max(t.r, Math.min(this.H - t.r, t.y || this.H/2));
      t.vx = (Math.random() - 0.5) * PHYSICS.VELOCITY_DAMPING;
      t.vy = (Math.random() - 0.5) * PHYSICS.VELOCITY_DAMPING;
    });
  }

  renderBubbles() {
    this.svg.selectAll('*').remove();
    const t = this.manager.tokens;
    const manager = this.manager;   // capture for callbacks
    const defs = this.svg.append('defs');
    t.forEach((d, i) => {
      defs.append('clipPath').attr('id', 'cp' + i).append('circle').attr('r', d.r * 0.91);
      const rg = defs.append('radialGradient').attr('id', 'rg' + i);
      rg.append('stop').attr('offset', '0%').attr('stop-color', 'rgba(0,0,0,0.58)');
      rg.append('stop').attr('offset', '52%').attr('stop-color', 'rgba(0,0,0,0.35)');
      rg.append('stop').attr('offset', '100%').attr('stop-color', 'rgba(0,0,0,0)');
      const ch = manager.getChange(d);
      const pos = ch >= 0;
      const hl = defs.append('radialGradient').attr('id', 'hl' + i);
      hl.append('stop').attr('offset', '65%').attr('stop-color', 'rgba(0,0,0,0)');
      hl.append('stop').attr('offset', '100%').attr('stop-color', pos ? 'rgba(0,255,102,0.2)' : 'rgba(255,34,85,0.2)');
    });

    this.node = this.svg.selectAll('g.tn').data(t, d => d.pairId).enter()
      .append('g').attr('class', 'tn')
      .attr('transform', d => `translate(${d.x},${d.y})`)
      .attr('tabindex', '0')
      .attr('role', 'button')
      .attr('aria-label', d => `Token ${d.ticker}, change ${formatPercent(manager.getChange(d))}`);

    // Outer glow ring
    this.node.append('circle').attr('class', 'pr')
      .attr('r', d => d.r + 10)
      .attr('fill', 'none')
      .attr('stroke', d => getColor(manager.getChange(d)))
      .attr('stroke-width', 0.7)
      .style('opacity', 0.18);

    // Selection ring (hidden by default)
    this.node.append('circle').attr('class', 'sr')
      .attr('r', d => d.r + 5)
      .style('opacity', 0)
      .attr('fill', 'none')
      .attr('stroke', '#FFD060')
      .attr('stroke-width', 3)
      .style('filter', 'drop-shadow(0 0 22px rgba(255,208,96,.95))');

    // Main bubble
    this.node.append('circle').attr('class', 'mr')
      .attr('r', d => d.r)
      .attr('fill', 'rgba(0,0,0,.08)')
      .attr('stroke', d => getColor(manager.getChange(d)))
      .attr('stroke-width', 2.5)
      .style('filter', d => `drop-shadow(0 0 20px ${getColor(manager.getChange(d))})`);

    // Token logo
    this.node.append('image').attr('href', d => d.logo || '')
      .attr('x', d => -d.r * 0.91).attr('y', d => -d.r * 0.91)
      .attr('width', d => d.r * 1.82).attr('height', d => d.r * 1.82)
      .attr('clip-path', (d, i) => `url(#cp${i})`)
      .attr('preserveAspectRatio', 'xMidYMid slice')
      .style('opacity', 0.82);

    // Overlay gradients
    this.node.append('circle').attr('r', d => d.r * 0.91)
      .attr('fill', (d, i) => `url(#rg${i})`)
      .style('pointer-events', 'none');
    this.node.append('circle').attr('r', d => d.r * 0.91)
      .attr('fill', (d, i) => `url(#hl${i})`)
      .style('pointer-events', 'none');

    // Inner white highlight
    this.node.append('circle').attr('r', d => d.r * 0.48)
      .attr('fill', 'rgba(255,255,255,0.13)')
      .attr('stroke', 'rgba(255,255,255,0.05)')
      .attr('stroke-width', 1)
      .style('pointer-events', 'none');

    // Labels (only once, with correct manager reference)
    this.node.each((d, i, nodes) => {
      const g = d3.select(nodes[i]);
      const ch = manager.getChange(d);
      const pct = formatPercent(ch);
      const clr = getColor(ch);
      const glw = `0 0 18px ${clr},0 0 5px rgba(0,0,0,1)`;
      const shd = '0 0 12px rgba(0,0,0,1),0 0 24px rgba(0,0,0,1),0 2px 4px rgba(0,0,0,1)';
      if (d.r > 56) {
        g.append('text').attr('dy', '-.1em').attr('text-anchor', 'middle')
          .style('font-family', 'Bebas Neue, sans-serif').style('font-size', Math.max(14, Math.min(28, d.r * 0.24)) + 'px')
          .style('letter-spacing', '.07em').style('fill', '#FFFFFF').style('text-shadow', shd).style('pointer-events', 'none').text(d.ticker);
        g.append('text').attr('dy', '1.15em').attr('text-anchor', 'middle')
          .style('font-family', 'Bebas Neue, sans-serif').style('font-size', Math.max(11, Math.min(22, d.r * 0.19)) + 'px')
          .style('fill', clr).style('text-shadow', glw).style('pointer-events', 'none').text(pct);
      } else if (d.r > 38) {
        g.append('text').attr('dy', '-.15em').attr('text-anchor', 'middle')
          .style('font-family', 'Bebas Neue, sans-serif').style('font-size', Math.max(11, Math.min(17, d.r * 0.25)) + 'px')
          .style('fill', '#FFFFFF').style('text-shadow', shd).style('pointer-events', 'none').text(d.ticker);
        g.append('text').attr('dy', '1.0em').attr('text-anchor', 'middle')
          .style('font-family', 'Bebas Neue, sans-serif').style('font-size', Math.max(9, Math.min(14, d.r * 0.21)) + 'px')
          .style('fill', clr).style('text-shadow', glw).style('pointer-events', 'none').text(pct);
      } else {
        g.append('text').attr('dy', '0').attr('text-anchor', 'middle')
          .style('font-family', 'Bebas Neue, sans-serif').style('font-size', Math.max(9, Math.min(13, d.r * 0.3)) + 'px')
          .style('fill', '#FFFFFF').style('text-shadow', shd).style('pointer-events', 'none').text(d.ticker);
      }
    });

    // Interaction events
    this.node.on('mouseenter', function(e, d) {
      d3.select(this).select('.mr')
        .attr('stroke', '#FFFFFF')
        .style('filter', 'drop-shadow(0 0 38px rgba(255,255,255,.8)) drop-shadow(0 0 90px rgba(0,255,102,.45))');
      d3.select(this).select('.pr').style('opacity', 0.42);
    })
    .on('mouseleave', function(e, d) {
      d3.select(this).select('.mr')
        .attr('stroke', getColor(manager.getChange(d)))
        .style('filter', `drop-shadow(0 0 20px ${getColor(manager.getChange(d))})`);
      d3.select(this).select('.pr').style('opacity', 0.18);
    })
    .on('click', function(e, d) {
      e.stopPropagation();
      manager.selectToken(d.pairId);
      // UI update is handled externally via UIController.renderAll() after this call
    });
  }

  updateSelectionHighlight() {
    if (!this.node) return;
    this.node.select('.sr').style('opacity', d => d.pairId === this.manager.selectedId ? 1 : 0);
  }

  updateBubblesPositions() {
    if (this.node) {
      this.node.attr('transform', d => `translate(${d.x},${d.y})`);
    }
  }

  physicsStep() {
    for (let i = 0; i < this.manager.tokens.length; i++) {
      const a = this.manager.tokens[i];
      a.vx += (this.mouse.x - a.x) * PHYSICS.ATTRACTION;
      a.vy += (this.mouse.y - a.y) * PHYSICS.ATTRACTION;
      a.x += a.vx; a.y += a.vy;
      a.vx *= PHYSICS.DAMPING; a.vy *= PHYSICS.DAMPING;
      if (a.x - a.r < 0) { a.x = a.r; a.vx *= -0.82; }
      if (a.x + a.r > this.W) { a.x = this.W - a.r; a.vx *= -0.82; }
      if (a.y - a.r < 0) { a.y = a.r; a.vy *= -0.82; }
      if (a.y + a.r > this.H) { a.y = this.H - a.r; a.vy *= -0.82; }
    }
    for (let i = 0; i < this.manager.tokens.length; i++) {
      for (let j = i + 1; j < this.manager.tokens.length; j++) {
        const a = this.manager.tokens[i], b = this.manager.tokens[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 0.001;
        const minD = a.r + b.r + this.pad;
        if (dist < minD) {
          const ov = (minD - dist) / 2, nx = dx/dist, ny = dy/dist;
          a.x -= nx * ov; a.y -= ny * ov;
          b.x += nx * ov; b.y += ny * ov;
          const dot = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
          if (dot > 0) {
            const k = dot * 0.46;
            a.vx -= k * nx; a.vy -= k * ny;
            b.vx += k * nx; b.vy += k * ny;
          }
        }
      }
    }
    this.updateBubblesPositions();
  }
}

// ============ 5. UI CONTROLLER ============
class UIController {
  constructor(manager, renderer) {
    this.manager = manager;
    this.renderer = renderer;
    this.dom = {};
    this.cacheDom();
    this.initEventListeners();
  }

  cacheDom() {
    const ids = ['sumGrid','pnlAmt','pnlHero','pnlVerdict','topRank','statsGrid','fLogo','fTicker','fName','fAddr','fPrice','focMcVal','dRow','vzB','cVal','cSub','fLinks','tsEl','caV','caB'];
    ids.forEach(id => { this.dom[id] = document.getElementById(id); });
  }

  initEventListeners() {
    // Period buttons
    document.querySelectorAll('.pbtn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pbtn').forEach(b => {
          b.classList.remove('on');
          b.setAttribute('aria-checked', 'false');
        });
        btn.classList.add('on');
        btn.setAttribute('aria-checked', 'true');
        this.manager.setPeriod(btn.dataset.p);
        this.fullRefresh();
      });
    });

    // Copy address button
    this.dom.caB.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(this.manager.getSelected()?.tokenMint || '');
        this.dom.caB.textContent = 'Copied!';
        setTimeout(() => (this.dom.caB.textContent = 'Copy'), 2000);
      } catch { /* ignore */ }
    });

    // PnL calculator
    this.dom.pnlCalc.addEventListener('click', () => this.renderPnL());

    // Event delegation for rank pills
    document.getElementById('topRank').addEventListener('click', e => {
      const pill = e.target.closest('.rp-pill');
      if (pill?.dataset.pid) {
        this.manager.selectToken(pill.dataset.pid);
        this.renderAll();
      }
    });

    // Focus address copy via delegation
    document.getElementById('fAddr').addEventListener('click', e => {
      if (e.target.classList.contains('copy-addr-btn')) {
        const addr = this.manager.getSelected()?.tokenMint || '';
        navigator.clipboard.writeText(addr);
        e.target.textContent = '✅';
        setTimeout(() => (e.target.textContent = '📋'), 1500);
      }
    });

    // SVG mouse / click
    this.renderer.svg.on('mousemove', e => {
      const [px, py] = d3.pointer(e);
      this.renderer.mouse.x = px;
      this.renderer.mouse.y = py;
    });
    this.renderer.svg.on('click', () => {
      if (this.manager.tokens[0]) {
        this.manager.selectToken(this.manager.tokens[0].pairId);
        this.renderAll();
      }
    });

    // Keyboard navigation on bubbles
    this.renderer.svg.on('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        const active = document.activeElement;
        const g = active?.closest?.('g.tn');
        if (g) {
          const d = d3.select(g).datum();
          if (d) {
            this.manager.selectToken(d.pairId);
            this.renderAll();
          }
        }
      }
    });

    // Resize handling
    const resizeHandler = debounce(() => {
      this.renderer.W = this.renderer.container.clientWidth;
      this.renderer.H = this.renderer.container.clientHeight;
      this.renderer.initSizes();
      this.renderer.recalcRadius();
      this.renderer.runSimulation();
      this.renderer.renderBubbles();
      this.renderAll();
    }, 250);
    window.addEventListener('resize', resizeHandler);
    new ResizeObserver(debounce(() => {
      this.renderer.W = this.renderer.container.clientWidth;
      this.renderer.H = this.renderer.container.clientHeight;
      this.renderer.recalcRadius();
      this.renderer.runSimulation();
      this.renderer.renderBubbles();
      this.renderAll();
    }, 250)).observe(this.renderer.container);
  }

  async fullRefresh() {
    try {
      const controller = new AbortController();
      const disc = await this.manager.loadTokens(controller.signal);
      this.manager.tokens = disc;
      if (!disc.length) {
        updateStatus('⚠️ No coins found. Check network.');
        return;
      }
      // Restore persistent selection
      const saved = localStorage.getItem('sleepSelectedId');
      if (saved && this.manager.tokens.some(t => t.pairId === saved)) {
        this.manager.selectToken(saved);
      } else {
        this.manager.selectToken(this.manager.tokens[0].pairId);
      }
      this.renderer.recalcRadius();
      this.renderer.runSimulation();
      this.renderer.renderBubbles();
      this.renderAll();
      document.getElementById('ldr').classList.add('out');
    } catch (e) {
      console.error('Refresh failed', e);
      updateStatus('❌ Data load error – retrying...');
    }
  }

  renderAll() {
    this.renderSummary();
    this.renderFocus();
    this.renderPnL();
    this.renderTopRank();
    this.renderStats();
    this.renderer.updateSelectionHighlight();
    this.dom.tsEl.textContent = `Updated ${new Date().toLocaleTimeString()}`;
    this.dom.caV.textContent = this.manager.getSelected()?.tokenMint || '';
  }

  renderSummary() {
    const sm = d3.sum(this.manager.tokens, d => d.mcap || d.fdv || 0);
    const sv = d3.sum(this.manager.tokens, d => d.volume24 || 0);
    const pos = this.manager.tokens.filter(d => this.manager.getChange(d) >= 0).length;
    const html = [
      {l:'Tracked',v:String(this.manager.tokens.length),s:'$25K+ MCAP floor'},
      {l:'Ecosystem MCAP',v:formatCurrency(sm),s:'Combined total'},
      {l:'24H Volume',v:formatCurrency(sv),s:pos+' in the green'}
    ].map(c => `<div class="sc"><div class="sc-l">${c.l}</div><div class="sc-v">${c.v}</div><div class="sc-s">${c.s}</div></div>`).join('');
    this.dom.sumGrid.innerHTML = html;
  }

  renderFocus() {
    const t = this.manager.getSelected();
    if (!t) return;
    this.dom.fLogo.src = t.logo || '';
    this.dom.fLogo.alt = `${t.ticker} logo`;
    this.dom.fTicker.textContent = t.ticker;
    this.dom.fName.textContent = t.name || t.ticker;
    this.dom.fAddr.innerHTML = `${formatAddr(t.tokenMint)} <span class="copy-addr-btn" role="button" tabindex="0">📋</span>`;
    this.dom.fPrice.textContent = formatCurrency(t.price);
    this.dom.focMcVal.textContent = formatCurrency(t.mcap || t.fdv || 0);
    const changes = [{l:'1H',v:t.change1},{l:'6H',v:t.change6},{l:'24H',v:t.change24}];
    this.dom.dRow.innerHTML = changes.map(d => {
      const pos = Number(d.v || 0) >= 0;
      return `<div class="dc ${pos?'pos':'neg'}"><div class="dc-l">${d.l}</div><div class="dc-v" style="color:${pos?'#00FF66':'#FF2255'};text-shadow:${pos?'0 0 18px rgba(0,255,102,.6)':'0 0 18px rgba(255,34,85,.6)'}">${formatPercent(d.v)}</div></div>`;
    }).join('');
    const maxMC = d3.max(this.manager.tokens, d => d.mcap || d.fdv || 0) || 1;
    const maxVol = d3.max(this.manager.tokens, d => d.volume24 || 0) || 1;
    const maxLiq = d3.max(this.manager.tokens, d => d.liquidity || 0) || 1;
    this.dom.vzB.innerHTML = [
      {l:'MCAP',p:Math.round(((t.mcap||t.fdv||0)/maxMC)*100),v:formatCompact(t.mcap||t.fdv||0)},
      {l:'VOL',p:Math.round((t.volume24/maxVol)*100),v:formatCompact(t.volume24)},
      {l:'LIQ',p:Math.round((t.liquidity/maxLiq)*100),v:formatCompact(t.liquidity)}
    ].map(r => `<div class="vr"><div class="vl">${r.l}</div><div class="vt"><div class="vf" style="width:${r.p}%"></div></div><div class="vv">${r.v}</div></div>`).join('');
    this.dom.cVal.textContent = formatCurrency(t.volume24);
    this.dom.cSub.textContent = `Liquidity ${formatCurrency(t.liquidity)}  ·  Txns ${formatCompact(t.txns24)}`;
    const links = [
      t.webUrl ? `<a class="fl" href="${t.webUrl}" target="_blank" rel="noopener">🌐 Website</a>` : '',
      t.xUrl ? `<a class="fl" href="${t.xUrl}" target="_blank" rel="noopener">🐦 Twitter</a>` : '',
      t.pairUrl ? `<a class="fl" href="${t.pairUrl}" target="_blank" rel="noopener">📈 Chart</a>` : ''
    ].filter(Boolean).join('');
    this.dom.fLinks.innerHTML = links;
  }

  renderPnL() {
    const t = this.manager.tokens;
    if (!t.length) return;
    const perCoin = Math.max(0.01, parseFloat(this.dom.pnlAmt.value) || 10);
    const totalIn = perCoin * t.length;
    const rows = t.map(tk => {
      const ch24 = Number(tk.change24 || 0);
      const ret = perCoin * ch24 / 100;
      return { tk, ch24, ret, final: perCoin + ret };
    }).sort((a,b) => b.ret - a.ret);
    const totalRet = rows.reduce((s,r) => s + r.ret, 0);
    const totalFin = totalIn + totalRet;
    const pctG = (totalRet / totalIn) * 100;
    const pos = rows.filter(r => r.ret >= 0).length;
    const heroPos = totalRet >= 0;
    this.dom.pnlHero.innerHTML = `
      <div class="phc"><div class="phc-l">Invested</div><div class="phc-v gold">$${totalIn.toFixed(2)}</div><div class="phc-s">${t.length} x $${perCoin.toFixed(2)}</div></div>
      <div class="phc"><div class="phc-l">24H Return</div><div class="phc-v ${heroPos?'pos':'neg'}">${totalRet>=0?'+':''}$${totalRet.toFixed(2)}</div><div class="phc-s">${pos} win · ${t.length-pos} lose</div></div>
      <div class="phc"><div class="phc-l">Total Value</div><div class="phc-v ${heroPos?'pos':'neg'}">$${totalFin.toFixed(2)}</div><div class="phc-s">${formatPercent(pctG)} overall</div></div>`;
    const vEl = this.dom.pnlVerdict;
    let msg, clr;
    if (pctG > 20) { msg = '🚀 WOKE UP RICH'; clr = '#00FF66'; }
    else if (pctG > 5) { msg = '📈 BAGS ARE HEAVY'; clr = '#00FF66'; }
    else if (pctG > 0) { msg = '😴 COMFY GAINS'; clr = '#80FFB0'; }
    else if (pctG > -5) { msg = '🌙 STILL SLEEPING'; clr = '#FFD060'; }
    else if (pctG > -20) { msg = '⚠️ ROUGH NAP'; clr = '#FFD060'; }
    else { msg = '💔 HOLD THOSE BAGS'; clr = '#FF2255'; }
    vEl.textContent = msg;
    vEl.style.color = clr;
  }

  renderTopRank() {
    const ranked = this.manager.tokens.slice().sort((a,b) => b.rankScore - a.rankScore).slice(0,5);
    this.dom.topRank.innerHTML = ranked.map((t,i) => {
      const ch = this.manager.getChange(t);
      const pos = ch >= 0;
      return `<div class="rp-pill${t.pairId===this.manager.selectedId?' on':''}" data-pid="${t.pairId}">
        <span class="rp-num">#${i+1}</span>
        <span class="rp-tk">$${t.ticker}</span>
        <span class="rp-ch ${pos?'pos':'neg'}">${pos?'+':''}${ch.toFixed(1)}%</span>
      </div>`;
    }).join('');
  }

  renderStats() {
    const pos = this.manager.tokens.filter(d => this.manager.getChange(d) >= 0);
    const neg = this.manager.tokens.filter(d => this.manager.getChange(d) < 0);
    const tm = d3.sum(this.manager.tokens, d => d.mcap || d.fdv || 0);
    const tv = d3.sum(this.manager.tokens, d => d.volume24 || 0);
    const topG = this.manager.tokens.reduce((a,b) => this.manager.getChange(a) > this.manager.getChange(b) ? a : b, this.manager.tokens[0] || {ticker:'--'});
    const topL = this.manager.tokens.reduce((a,b) => this.manager.getChange(a) < this.manager.getChange(b) ? a : b, this.manager.tokens[0] || {ticker:'--'});
    const avgCh = this.manager.tokens.length ? d3.mean(this.manager.tokens, d => this.manager.getChange(d)) : 0;
    const pills = [
      {cls:'gp', icon:'📈', lbl:'Gainers', val:pos.length+' coins', sub:this.manager.period+'H', vc:'sv-g'},
      {cls:'rp', icon:'📉', lbl:'Losers', val:neg.length+' coins', sub:this.manager.period+'H', vc:'sv-r'},
      {cls:'golp', icon:'💰', lbl:'Total MCAP', val:formatCurrency(tm), sub:'Combined', vc:'sv-gold'},
      {cls:'gp', icon:'⚡', lbl:'24H Volume', val:formatCurrency(tv), sub:'All pairs', vc:'sv-g'},
      {cls:'tealp', icon:'🏆', lbl:'Top Gainer', val:'$'+(topG.ticker||'--'), sub:formatPercent(this.manager.getChange(topG)), vc:'sv-teal'},
      {cls:'rp', icon:'💔', lbl:'Top Loser', val:'$'+(topL.ticker||'--'), sub:formatPercent(this.manager.getChange(topL)), vc:'sv-r'},
      {cls:'golp', icon:'🌙', lbl:`Avg ${this.manager.period}H`, val:formatPercent(avgCh), sub:this.manager.tokens.length+' tracked', vc:avgCh>=0?'sv-g':'sv-r'}
    ];
    this.dom.statsGrid.innerHTML = pills.map((p,i) =>
      (i>0?'<div class="stat-div"></div>':'') +
      `<div class="stat-pill ${p.cls}"><div class="sp-icon">${p.icon}</div><div class="sp-body"><div class="sp-lbl">${p.lbl}</div><div class="sp-val ${p.vc}">${p.val}</div><div class="sp-sub">${p.sub}</div></div></div>`
    ).join('');
  }
}

// ============ 6. ANIMATED SQUARE ============
function initAnimatedSquare() {
  const sqDiv = document.getElementById('sq');
  const bulbs = [];
  for (let i = 0; i < 16; i++) {
    const b = document.createElement('div');
    b.className = 'bulb';
    sqDiv.appendChild(b);
    bulbs.push(b);
  }
  const P = ['#00ff66','#00cc44','#aaffcc','#ffffff'];
  function lit(i,c,v=1){if(i<0||i>15)return;bulbs[i].style.background=c;bulbs[i].style.opacity=String(0.05+v*0.95);bulbs[i].style.boxShadow=v>0.2?`0 0 ${v*16}px ${c},0 0 ${v*5}px ${c}`:'none';}
  function dim(i){bulbs[i].style.opacity='0.05';bulbs[i].style.boxShadow='none';}
  function dimAll(){for(let i=0;i<16;i++)dim(i);}

  const modes = [
    () => { const LEY={top:[1,2],bot:[9,10]}, REY={top:[5,6],bot:[13,14]};
      return setInterval(() => { dimAll(); [...LEY.top,...LEY.bot,...REY.top,...REY.bot].forEach(i=>lit(i,P[2])); [2,6,10,14].forEach(i=>lit(i,P[0])); }, 380); },
    () => { const path=[0,1,2,3,4,5,6,7,15,14,13,12,11,10,9,8,8,9,10,11,12,13,14,15]; let s=0;
      return setInterval(() => { dimAll(); lit(path[s%path.length],P[s%2===0?0:3]); if(s>0)lit(path[(s-1+path.length)%path.length],P[1],0.25); s++; }, 110); },
    () => { const state=new Float32Array(16),target=new Float32Array(16); const cols=Array(16).fill(0).map(()=>P[Math.floor(Math.random()*4)]);
      function newTargets(){target.forEach((_,i)=>target[i]=Math.random()<0.35?0.1+Math.random()*0.9:0.04);} newTargets(); let t=0;
      return setInterval(() => { for(let i=0;i<16;i++){ state[i]+=(target[i]-state[i])*0.12; if(state[i]>0.08)lit(i,cols[i],state[i]); else dim(i); }
        if(t%18===0){newTargets();cols.forEach((_,i)=>cols[i]=P[Math.floor(Math.random()*4)]);} t++; }, 60); },
    () => { let pos=0,row=0,ci=0;
      return setInterval(() => { dimAll(); lit(row*8+pos,P[ci%2===0?0:3]); if(pos>0)lit(row*8+pos-1,P[0],0.22); pos++;if(pos>=8){pos=0;row=1-row;if(row===0)ci++;} }, 130); },
    () => { let t=0;
      return setInterval(() => { for(let i=0;i<16;i++){ const phase=(t*0.06)+(i%8)*0.25+(Math.floor(i/8)*0.8); lit(i,P[i<8?0:3],0.35+0.65*(0.5+0.5*Math.sin(phase))); } t++; }, 55); }
  ];
  let idx = 0, cur = modes[0]();
  sqDiv.addEventListener('click', () => { clearInterval(cur); dimAll(); idx = (idx+1)%5; cur = modes[idx](); });
  sqDiv.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { clearInterval(cur); dimAll(); idx = (idx+1)%5; cur = modes[idx](); } });
}

// ============ 8. GLOBAL HELPERS ============
function updateStatus(msg) {
  ['ftSt','ldSt'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = msg;
  });
}

// ============ 9. BOOTSTRAP ============
async function initApp() {
  const manager = new TokenManager();
  const container = document.getElementById('cont');
  const renderer = new Renderer(container, '#svg', manager);
  const ui = new UIController(manager, renderer);

  // Sync period button with persistent state
  const savedPeriod = manager.period;
  document.querySelectorAll('.pbtn').forEach(b => {
    b.classList.toggle('on', b.dataset.p === savedPeriod);
    b.setAttribute('aria-checked', b.dataset.p === savedPeriod ? 'true' : 'false');
  });

  // Load D3 if not already present
  if (typeof d3 === 'undefined') {
    updateStatus('Loading visualization engine...');
    await new Promise((res, rej) => {
      const script = document.createElement('script');
      script.src = 'https://d3js.org/d3.v7.min.js';
      script.onload = res;
      script.onerror = rej;
      document.head.appendChild(script);
    });
  }

  await ui.fullRefresh();
  initAnimatedSquare();
  initTerminal();

  function animate() {
    renderer.physicsStep();
    requestAnimationFrame(animate);
  }
  animate();

  // Auto refresh
  setInterval(() => ui.fullRefresh(), REFRESH_MS);
}

document.addEventListener('DOMContentLoaded', initApp);
