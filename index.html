<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
<title>$SLEEP | Bags.Fm Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#010301; --g:#00FF66; --g2:#00CC44; --g3:#80FFB0; --g4:#33FF88;
  --gdim:rgba(0,255,102,.07); --gbright:rgba(0,255,102,.18);
  --red:#FF2255; --gold:#FFD060; --golddim:rgba(255,208,96,.1);
  --cream:#EFFFEF; --cream2:#C8F0C8;
  --mut:#1C4020; --mut2:#0D220F; --mut3:#2A5C2A;
  --bor:rgba(0,255,102,.11); --bor2:rgba(0,255,102,.28); --bor3:rgba(0,255,102,.55);
  --fd:'Bebas Neue',sans-serif; --fm:'Share Tech Mono',monospace; --fb:'Rajdhani',sans-serif;
  --gs:0 0 14px rgba(0,255,102,.45);
  --gm:0 0 28px rgba(0,255,102,.55),0 0 70px rgba(0,255,102,.18);
  --gl:0 0 48px rgba(0,255,102,.65),0 0 120px rgba(0,255,102,.22);
  --gxl:0 0 70px rgba(0,255,102,.8),0 0 180px rgba(0,255,102,.3);
  --rs:0 0 14px rgba(255,34,85,.45);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--fb);color:var(--cream);cursor:default}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:8000;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,255,102,.016) 3px,rgba(0,255,102,.016) 4px)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:8001;opacity:.38;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E")}
.amb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(110px);z-index:0}
.a1{width:900px;height:900px;background:var(--g);top:-320px;left:-280px;opacity:.028;animation:aa1 16s ease-in-out infinite}
.a2{width:700px;height:700px;background:var(--g2);bottom:-260px;right:-200px;opacity:.035;animation:aa2 20s ease-in-out infinite}
.a3{width:500px;height:500px;background:var(--g4);top:45%;left:38%;transform:translate(-50%,-50%);opacity:.016;animation:aa3 12s ease-in-out infinite}
@keyframes aa1{0%,100%{transform:translate(0,0)}50%{transform:translate(70px,50px)}}
@keyframes aa2{0%,100%{transform:translate(0,0)}50%{transform:translate(-55px,-45px)}}
@keyframes aa3{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}

#ldr{position:fixed;inset:0;background:var(--bg);z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .9s,visibility .9s}
#ldr.out{opacity:0;visibility:hidden;pointer-events:none}
.lz{position:absolute;font-family:var(--fd);color:var(--g);pointer-events:none;text-shadow:var(--gl);animation:lzf 6s ease-in-out infinite}
.lz1{font-size:180px;top:4%;left:2%;opacity:.05;animation-delay:0s}
.lz2{font-size:110px;top:10%;right:6%;opacity:.04;animation-delay:2s}
.lz3{font-size:75px;bottom:10%;left:10%;opacity:.035;animation-delay:4s}
.lz4{font-size:55px;bottom:18%;right:12%;opacity:.03;animation-delay:1s}
@keyframes lzf{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-38px) rotate(6deg)}}
.l-brand{font-family:var(--fd);font-size:130px;letter-spacing:.12em;color:var(--g);text-shadow:var(--gxl);animation:lbp 2s ease-in-out infinite;z-index:1;position:relative;line-height:1}
@keyframes lbp{0%,100%{text-shadow:var(--gxl)}50%{text-shadow:0 0 110px rgba(0,255,102,1),0 0 280px rgba(0,255,102,.45)}}
.l-moon{font-size:56px;filter:drop-shadow(0 0 20px var(--g));animation:mnp 3s ease-in-out infinite;z-index:1;position:relative}
.l-slogan{font-family:var(--fd);font-size:26px;letter-spacing:.52em;color:var(--g2);text-shadow:var(--gs);z-index:1;position:relative}
.l-sub{font-family:var(--fm);font-size:13px;letter-spacing:.28em;color:var(--mut3);text-transform:uppercase;z-index:1;position:relative}
.l-bar-w{width:280px;height:2px;background:var(--mut2);overflow:hidden;z-index:1;position:relative}
.l-bar{height:100%;width:35%;background:linear-gradient(90deg,transparent,var(--g),transparent);animation:lbs 1.3s ease-in-out infinite}
@keyframes lbs{from{transform:translateX(-150%)}to{transform:translateX(420%)}}
.l-stat{font-family:var(--fm);font-size:12px;letter-spacing:.2em;color:var(--mut3);text-transform:uppercase;z-index:1;position:relative;text-align:center;max-width:380px;line-height:1.7}

/* ---- MOBILE FIRST LAYOUT (default) ---- */
#app{display:flex;flex-direction:column;height:100vh;width:100vw;position:relative;z-index:1}

/* Nav - simple top bar */
#nav{display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:50px;background:rgba(1,3,1,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bor2);flex-shrink:0;position:relative;z-index:100}
#nav::before{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--g),transparent);box-shadow:var(--gs)}
.nav-logo{display:flex;align-items:center;gap:8px}
.nav-moon{font-size:24px;filter:drop-shadow(0 0 10px var(--g))}
.nav-brand{font-family:var(--fd);font-size:28px;letter-spacing:.1em;color:var(--g);text-shadow:var(--gm);line-height:1}
.nav-tagline{display:none}
.nav-mid{display:none}
.nav-right{display:flex;align-items:center;gap:8px}
.live-tag{font-family:var(--fm);font-size:9px;letter-spacing:.1em;color:var(--g2);text-transform:uppercase;background:var(--gdim);border:1px solid var(--bor2);padding:4px 10px;display:flex;align-items:center;gap:5px}
.ldot{width:6px;height:6px;border-radius:50%;background:#FFD060;box-shadow:0 0 8px rgba(255,208,96,.7);animation:blk 1.6s ease-in-out infinite}
@keyframes blk{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.15;transform:scale(.6)}}
.ca-row{display:none}

/* Main area: bubble container */
#main{flex:1;min-height:0;display:flex;flex-direction:column}
#bcol{flex:1;display:flex;flex-direction:column;padding:6px;min-height:0}
#topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px}
.period-grp{display:flex;gap:2px;background:rgba(0,255,102,.04);border:1px solid var(--bor);padding:2px;border-radius:4px}
.pbtn{font-family:var(--fm);font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border:1px solid transparent;color:var(--mut3);background:transparent;cursor:pointer;transition:all .2s;border-radius:3px}
.pbtn:hover{color:var(--g2)}
.pbtn.on{color:var(--g);border-color:var(--bor3);background:rgba(0,255,102,.12);box-shadow:var(--gs)}
#topRank{flex:1;display:flex;gap:4px;overflow-x:auto;align-items:center;padding:0 2px;-ms-overflow-style:none;scrollbar-width:none}
#topRank::-webkit-scrollbar{display:none}
.rp-pill{display:flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(0,255,102,.04);border:1px solid var(--bor);border-radius:12px;white-space:nowrap;font-family:var(--fm);font-size:10px;letter-spacing:.04em;cursor:pointer;transition:all .2s;color:var(--cream2);flex-shrink:0}
.rp-pill:hover,.rp-pill.on{background:rgba(0,255,102,.12);border-color:var(--bor3);box-shadow:var(--gs);color:var(--g)}
.rp-num{font-family:var(--fd);font-size:12px;color:var(--g);min-width:16px;text-align:center}
.rp-tk{font-family:var(--fd);font-size:14px;letter-spacing:.03em;color:#fff}
.rp-ch{font-family:var(--fm);font-size:10px;font-weight:700}
.rp-ch.pos{color:var(--g)}.rp-ch.neg{color:var(--red)}
/* bubble container fills the rest */
#bwrap{flex:1;position:relative;min-height:0;overflow:hidden;border-radius:8px;border:1px solid var(--bor2);background:radial-gradient(ellipse at 50% 50%,rgba(0,255,102,.07) 0%,transparent 62%),#010301}
#bwrap::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:3;box-shadow:inset 0 0 0 1px var(--bor)}
#cont{position:absolute;inset:0;overflow:hidden}
#cont::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,255,102,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,102,.018) 1px,transparent 1px);background-size:40px 40px}
#svg{width:100%;height:100%;display:block;position:relative;z-index:1}
.ftag{position:absolute;pointer-events:none;z-index:2;font-family:var(--fd);text-transform:uppercase;letter-spacing:.3em}
.ft1{top:8px;right:10px;font-size:10px;color:rgba(0,255,102,.12)}
.ft2{bottom:8px;left:10px;font-size:40px;color:rgba(0,255,102,.07);letter-spacing:.04em}

/* right column (simulator, square, terminal) hidden on mobile */
#rightCol, #sb, #sleepStrip, #statsbar, .sq, #terminal, .pnl-compact, #footer{display:none}

/* ---- DESKTOP STYLES (min-width: 901px) ---- */
@media(min-width:901px){
  #app{display:grid;grid-template-rows:60px 1fr 44px 88px 46px;height:100vh}
  #nav{height:60px;padding:0 22px}
  .nav-logo{gap:12px}
  .nav-moon{font-size:26px}
  .nav-brand{font-size:34px;letter-spacing:.14em}
  .nav-tagline{display:block;font-family:var(--fm);font-size:11px;letter-spacing:.22em;color:var(--mut3);text-transform:uppercase;margin-top:2px}
  .nav-mid{position:absolute;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px}
  .nav-mid-title{font-family:var(--fd);font-size:20px;letter-spacing:.32em;color:var(--g);text-shadow:var(--gs)}
  .live-tag{font-size:11px;padding:7px 15px}
  .ldot{width:8px;height:8px}
  .ca-row{display:flex;align-items:center;gap:7px;background:var(--gdim);border:1px solid var(--bor);padding:6px 11px;max-width:280px;overflow:hidden}
  .ca-lbl{font-family:var(--fm);font-size:11px;letter-spacing:.22em;color:var(--mut3);text-transform:uppercase;flex-shrink:0}
  .ca-val{font-family:var(--fm);font-size:9px;color:var(--g3);white-space:nowrap;overflow-x:auto;max-width:170px;display:inline-block;letter-spacing:0}
  .ca-val::-webkit-scrollbar{height:2px}
  .ca-val::-webkit-scrollbar-thumb{background:var(--bor2)}
  .ca-btn{font-family:var(--fm);font-size:10px;letter-spacing:.14em;text-transform:uppercase;background:transparent;border:1px solid var(--bor2);color:var(--g2);cursor:pointer;padding:5px 12px;transition:all .2s;flex-shrink:0}
  .ca-btn:hover{background:var(--gdim);border-color:var(--bor3);color:var(--g);box-shadow:var(--gs)}

  #main{display:grid;grid-template-columns:1fr 480px;overflow:hidden;min-height:0}
  #bcol{display:grid;grid-template-columns:1fr 310px;grid-template-rows:auto 1fr;gap:10px;padding:12px 8px 10px 12px;min-height:0}
  #topbar{grid-column:1/-1}
  .period-grp{padding:3px}
  .pbtn{padding:8px 20px;font-size:11px}
  #topRank{gap:5px}
  .rp-pill{padding:6px 10px;font-size:11px;gap:5px}
  .rp-num{font-size:14px}
  .rp-tk{font-size:15px}
  .rp-ch{font-size:11px}

  #bwrap::after{background:linear-gradient(var(--g),var(--g)) top left/44px 2px no-repeat,linear-gradient(var(--g),var(--g)) top left/2px 44px no-repeat,linear-gradient(var(--g),var(--g)) top right/44px 2px no-repeat,linear-gradient(var(--g),var(--g)) top right/2px 44px no-repeat,linear-gradient(var(--g),var(--g)) bottom left/44px 2px no-repeat,linear-gradient(var(--g),var(--g)) bottom left/2px 44px no-repeat,linear-gradient(var(--g),var(--g)) bottom right/44px 2px no-repeat,linear-gradient(var(--g),var(--g)) bottom right/2px 44px no-repeat}
  #cont::before{background-size:54px 54px}
  .ft1{font-size:12px;top:14px;right:18px}
  .ft2{font-size:66px;bottom:14px;left:16px}

  #rightCol{display:flex;flex-direction:column;gap:8px;min-height:0;overflow:hidden}
  .pnl-compact{flex:0 0 auto;display:flex;flex-direction:column;background:rgba(0,6,0,.85);border:1px solid var(--bor2);box-shadow:0 0 28px rgba(0,255,102,.1),inset 0 0 20px rgba(0,0,0,.7);position:relative;overflow:hidden}
  .pnl-compact::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);box-shadow:0 0 10px rgba(255,208,96,.35);z-index:1}
  .pnl-compact .pnl-hd{padding:6px 9px 5px;border-bottom:1px solid rgba(255,208,96,.12);user-select:none;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:rgba(255,208,96,.02)}
  .pnl-compact .pnl-hd-l{display:flex;align-items:center;gap:6px}
  .pnl-compact .pnl-icon{font-size:20px;filter:drop-shadow(0 0 6px var(--gold))}
  .pnl-compact .pnl-title{font-family:var(--fd);font-size:16px;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;line-height:1}
  .pnl-compact .pnl-sub{font-family:var(--fm);font-size:10px;letter-spacing:.12em;color:var(--mut3);text-transform:uppercase}
  .pnl-compact .pnl-inp-row{display:flex;align-items:center;gap:4px;padding:5px 9px;border-bottom:1px solid rgba(255,208,96,.1);background:rgba(255,208,96,.02);flex-shrink:0;flex-wrap:wrap}
  .pnl-compact .pnl-inp-lbl{font-family:var(--fm);font-size:10px;letter-spacing:.14em;color:var(--mut3);text-transform:uppercase;white-space:nowrap}
  .pnl-compact .pnl-suf{font-family:var(--fm);font-size:11px;color:var(--gold)}
  .pnl-compact .pnl-inp{font-family:var(--fm);font-size:11px;letter-spacing:.08em;background:rgba(255,208,96,.06);border:1px solid rgba(255,208,96,.25);color:var(--gold);padding:4px 7px;width:52px;outline:none;transition:border-color .2s;text-align:right}
  .pnl-compact .pnl-inp:focus{border-color:rgba(255,208,96,.6);box-shadow:0 0 8px rgba(255,208,96,.2)}
  .pnl-compact .pnl-calc{font-family:var(--fm);font-size:10px;letter-spacing:.1em;text-transform:uppercase;background:rgba(255,208,96,.1);border:1px solid rgba(255,208,96,.3);color:var(--gold);padding:4px 8px;cursor:pointer;transition:all .2s;margin-left:auto}
  .pnl-compact .pnl-calc:hover{background:rgba(255,208,96,.22);border-color:rgba(255,208,96,.6);box-shadow:0 0 10px rgba(255,208,96,.3)}
  .pnl-compact .pnl-hero{display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid rgba(255,208,96,.1);flex-shrink:0}
  .pnl-compact .phc{padding:8px 3px;text-align:center;border-right:1px solid rgba(255,208,96,.1)}
  .pnl-compact .phc:last-child{border:none}
  .pnl-compact .phc-l{font-family:var(--fm);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut3)}
  .pnl-compact .phc-v{font-family:var(--fd);font-size:18px;letter-spacing:.04em;line-height:1;margin-top:4px}
  .pnl-compact .phc-v.pos{color:var(--g);text-shadow:var(--gs)}
  .pnl-compact .phc-v.neg{color:var(--red);text-shadow:var(--rs)}
  .pnl-compact .phc-v.gold{color:var(--gold);text-shadow:0 0 10px rgba(255,208,96,.4)}
  .pnl-compact .phc-s{font-family:var(--fm);font-size:10px;color:var(--mut3);margin-top:2px}
  .pnl-compact .pnl-verdict{padding:6px 9px;font-family:var(--fd);font-size:13px;letter-spacing:.1em;text-align:center;text-transform:uppercase;border-top:1px solid rgba(255,208,96,.1);flex-shrink:0}
  .sq{position:relative;width:100%;aspect-ratio:3/1;background:#000;border-radius:12px;overflow:hidden;display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:1fr 1fr;gap:3px;padding:3px;cursor:pointer;flex-shrink:0}
  .sq-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--fd);font-size:17px;letter-spacing:0.1em;color:#00ff66;text-shadow:0 0 10px #00ff66;z-index:5;pointer-events:none;white-space:nowrap}
  .sq-label a{color:#ffffff;text-decoration:none;pointer-events:auto;transition:all 0.2s}
  .sq-label a:hover{text-shadow:0 0 16px #ffffff,0 0 30px #ffffff}
  .bulb{border-radius:6px;opacity:0.08;aspect-ratio:1;transition:opacity 0.07s,box-shadow 0.07s}
  #terminal{flex:0 0 auto;background:rgba(0,4,0,.93);border:1px solid var(--bor2);box-shadow:0 0 30px rgba(0,255,102,.1),inset 0 0 20px rgba(0,0,0,.8);backdrop-filter:blur(12px);display:flex;flex-direction:column;overflow:hidden;position:relative}
  #terminal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--g),transparent);box-shadow:var(--gs);z-index:1}
  .term-hd{display:flex;align-items:center;justify-content:space-between;padding:5px 9px 4px;border-bottom:1px solid var(--bor);background:rgba(0,255,102,.04);flex-shrink:0}
  .term-hd-l{display:flex;align-items:center;gap:5px}
  .term-dot{width:6px;height:6px;border-radius:50%}
  .td1{background:#FF5F57}.td2{background:#FFBD2E}.td3{background:var(--g);box-shadow:0 0 5px var(--g)}
  .term-title{font-family:var(--fm);font-size:10px;letter-spacing:.18em;color:var(--g2);text-transform:uppercase;margin-left:3px}
  .term-st{display:flex;align-items:center;gap:4px;font-family:var(--fm);font-size:10px;letter-spacing:.1em;color:var(--mut3);text-transform:uppercase}
  .term-st-dot{width:4px;height:4px;border-radius:50%;background:var(--g);box-shadow:var(--gs);animation:blk 1.6s ease-in-out infinite}
  .term-body{flex:0 0 auto;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;position:relative;padding:5px 9px 6px;min-height:0}
  .term-body::before{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.2) 2px,rgba(0,0,0,.2) 3px);z-index:1}
  .term-lines{display:flex;flex-direction:column;gap:1px;position:relative;z-index:2}
  .tl{font-family:var(--fm);font-size:10px;letter-spacing:.08em;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;animation:tlfade .3s ease}
  @keyframes tlfade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .tl-p{color:var(--mut3)}.tl-c{color:var(--g2)}.tl-ok{color:var(--g)}.tl-w{color:#FFD060}.tl-e{color:var(--red)}.tl-sl{color:var(--g3)}.tl-d{color:var(--cream2)}.tl-dim{color:var(--mut3)}
  .tcrsr{display:inline-block;width:6px;height:10px;background:var(--g);vertical-align:middle;animation:tcrsr .75s step-end infinite;box-shadow:var(--gs);margin-left:2px}
  @keyframes tcrsr{0%,100%{opacity:1}50%{opacity:0}}

  #sb{display:flex;flex-direction:column;background:rgba(2,7,2,.98);border-left:2px solid var(--bor2);overflow:hidden;min-height:0}
  .sb-glow{flex-shrink:0;height:2px;background:linear-gradient(90deg,transparent,var(--g),transparent);box-shadow:var(--gm)}
  .sb-hd{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;border-bottom:1px solid var(--bor)}
  .sb-hd-l{display:flex;align-items:center;gap:10px}
  .sb-moon{font-size:26px;filter:drop-shadow(0 0 14px var(--g))}
  .sb-title{font-family:var(--fd);font-size:28px;letter-spacing:.08em;color:var(--g);text-shadow:var(--gm);line-height:1}
  .sb-sub{font-family:var(--fm);font-size:10px;letter-spacing:.18em;color:var(--mut3);text-transform:uppercase;margin-top:2px}
  .sb-ts{font-family:var(--fm);font-size:10px;letter-spacing:.1em;color:var(--g2);background:var(--gdim);border:1px solid var(--bor2);padding:5px 10px;text-transform:uppercase;white-space:nowrap}
  .sb-sum{flex-shrink:0;display:grid;grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--bor)}
  .sc{padding:8px 10px;text-align:center;border-right:1px solid var(--bor)}
  .sc:last-child{border:none}
  .sc-l{font-family:var(--fm);font-size:10px;letter-spacing:.18em;color:var(--mut3);text-transform:uppercase}

const fc=n=>{ if(!Number.isFinite(n)||n===0)return"--"; if(n>=1e9)return"$"+(n/1e9).toFixed(2)+"B"; if(n>=1e6)return"$"+(n/1e6).toFixed(2)+"M"; if(n>=1e3)return"$"+(n/1e3).toFixed(1)+"K"; if(n>=1)return"$"+n.toFixed(4); return"$"+n.toFixed(8); };
const fcp=n=>{ if(!Number.isFinite(n))return"--"; return new Intl.NumberFormat("en-US",{notation:"compact",maximumFractionDigits:2}).format(n); };
const fp=n=>{ const v=Number(n||0); return(v>0?"+":"")+v.toFixed(2)+"%"; };

async function fetchPair(pair){
  try{
    const r=await fetch("https://api.dexscreener.com/latest/dex/pairs/solana/"+pair.pairId);
    const j=await r.json(); const p=j.pairs?.[0];
    if(!p?.baseToken?.symbol) return null;
    const ws=(p.info?.websites)||[]; const ss=(p.info?.socials)||[]; const xs=ss.find(s=>s.type==="twitter");
    return{
      tokenMint:p.baseToken.address||pair.pairId, pairId:pair.pairId,
      ticker:p.baseToken.symbol, name:p.baseToken.name||p.baseToken.symbol,
      price:Number(p.priceUsd||0),
      change24:Number(p.priceChange?.h24||0), change6:Number(p.priceChange?.h6||0), change1:Number(p.priceChange?.h1||0),
      volume24:Number(p.volume?.h24||0), liquidity:Number(p.liquidity?.usd||0),
      fdv:Number(p.fdv||0), mcap:Number(p.marketCap||0),
      txns24:Number((p.txns?.h24?.buys||0)+(p.txns?.h24?.sells||0)),
      pairUrl:p.url||"", logo:pair.logo||p.info?.imageUrl||"",
      xUrl:xs?.url||"", webUrl:ws[0]?.url||"", rankScore:0
    };
  }catch(e){ return null; }
}

async function searchDex(term){
  try{ const r=await fetch("https://api.dexscreener.com/latest/dex/search/?q="+encodeURIComponent(term)); const j=await r.json(); return Array.isArray(j.pairs)?j.pairs:[]; }
  catch(e){ return []; }
}
function normPair(p){
  if(!p||p.chainId!=="solana"||!p.baseToken?.address) return null;
  if(!p.baseToken.address.toLowerCase().endsWith("bags")) return null;
  const ws=(p.info?.websites)||[]; const ss=(p.info?.socials)||[]; const xs=ss.find(s=>s.type==="twitter");
  return{ tokenMint:p.baseToken.address, pairId:p.pairAddress, ticker:p.baseToken.symbol||"?", name:p.baseToken.name||"",
    price:Number(p.priceUsd||0), change24:Number(p.priceChange?.h24||0), change6:Number(p.priceChange?.h6||0), change1:Number(p.priceChange?.h1||0),
    volume24:Number(p.volume?.h24||0), liquidity:Number(p.liquidity?.usd||0), fdv:Number(p.fdv||0), mcap:Number(p.marketCap||0),
    txns24:Number((p.txns?.h24?.buys||0)+(p.txns?.h24?.sells||0)),
    pairUrl:p.url||"", logo:p.info?.imageUrl||"", xUrl:xs?.url||"", webUrl:ws[0]?.url||"", rankScore:0 };
}
function scoreArr(arr){
  const mm=d3.max(arr,d=>d.mcap||d.fdv||0)||1, mv=d3.max(arr,d=>d.volume24||0)||1, ml=d3.max(arr,d=>d.liquidity||0)||1;
  return arr.map(t=>{ const ms=Math.sqrt((t.mcap||t.fdv||0)/mm), vs=Math.sqrt((t.volume24||0)/mv), ls=Math.sqrt((t.liquidity||0)/ml); t.rankScore=ms*.5+vs*.35+ls*.15; return t; });
}

async function loadTokens(){
  setSt("🌙 Scanning DexScreener for Bags.fm contracts...");
  try{
    const searches=await Promise.all(["bags","bags.fm","solana bags"].map(searchDex));
    const map=new Map();
    searches.flat().forEach(p=>{ const n=normPair(p); if(!n) return; const ex=map.get(n.tokenMint); if(!ex||(n.mcap||n.fdv||0)> (ex.mcap||ex.fdv||0)) map.set(n.tokenMint,n); });
    const dyn=scoreArr(Array.from(map.values())).filter(t=>(t.mcap||t.fdv||0)>=25000).sort((a,b)=>b.rankScore-a.rankScore).slice(0,15);
    if(dyn.length>=5){ setSt("✅ "+dyn.length+" coins live"); return dyn; }
  }catch(e){}
  const res=(await Promise.allSettled(FALLBACK.map(fetchPair))).filter(r=>r.status==="fulfilled"&&r.value).map(r=>r.value);
  return scoreArr(res).sort((a,b)=>b.rankScore-a.rankScore);
}

function calcR(){
  const maxCh=d3.max(tokens,d=>Math.abs(gch(d)))||1;
  const area=Math.max(W*H*.65,1);
  const mx=d3.max(tokens,d=>d.rankScore||0)||1;
  const wts=tokens.map(t=>{ const sw=Math.pow(Math.max(t.rankScore/mx,.01),1.2); const cw=(Math.abs(gch(t))/maxCh); return sw*0.2 + cw*0.8 + 0.02; });
  const sum=d3.sum(wts);
  tokens.forEach((t,i)=>{ t.r=Math.sqrt((wts[i]/sum*area)/Math.PI); t.r=Math.max(minR,Math.min(maxR,t.r)); });
}
function runSim(){
  const sim=d3.forceSimulation(tokens).force("x",d3.forceX(W/2).strength(.09)).force("y",d3.forceY(H/2).strength(.09)).force("collide",d3.forceCollide(d=>d.r+pad)).stop();
  for(let i=0;i<500;i++) sim.tick();
  tokens.forEach(t=>{ t.x=Math.max(t.r,Math.min(W-t.r,t.x||W/2)); t.y=Math.max(t.r,Math.min(H-t.r,t.y||H/2)); t.vx=(Math.random()-.5)*SPD; t.vy=(Math.random()-.5)*SPD; });
}

function renderNodes(){
  svg.selectAll("*").remove();
  const defs=svg.append("defs");
  tokens.forEach((t,i)=>{
    defs.append("clipPath").attr("id","cp"+i).append("circle").attr("r",t.r*.91);
    const rg=defs.append("radialGradient").attr("id","rg"+i).attr("cx","50%").attr("cy","50%").attr("r","50%");
    rg.append("stop").attr("offset","0%").attr("stop-color","rgba(0,0,0,0.58)");
    rg.append("stop").attr("offset","52%").attr("stop-color","rgba(0,0,0,0.35)");
    rg.append("stop").attr("offset","100%").attr("stop-color","rgba(0,0,0,0)");
    const ch=gch(t), pos=ch>=0;
    const hl=defs.append("radialGradient").attr("id","hl"+i).attr("cx","50%").attr("cy","50%").attr("r","50%");
    hl.append("stop").attr("offset","65%").attr("stop-color","rgba(0,0,0,0)");
    hl.append("stop").attr("offset","100%").attr("stop-color",pos?"rgba(0,255,102,0.2)":"rgba(255,34,85,0.2)");
  });

  node=svg.selectAll("g.tn").data(tokens,d=>d.pairId).enter().append("g").attr("class","tn")
    .attr("transform",d=>"translate("+d.x+","+d.y+")").style("cursor","pointer");

  node.append("circle").attr("class","pr").attr("r",d=>d.r+10).attr("fill","none").attr("stroke",d=>gclr(gch(d))).attr("stroke-width",.7).style("opacity",.18);
  node.append("circle").attr("class","sr").attr("r",d=>d.r+5).attr("fill","none").attr("stroke","#FFD060").attr("stroke-width",3).style("filter","drop-shadow(0 0 22px rgba(255,208,96,.95))").style("opacity",d=>d.pairId===selId?1:0);
  node.append("circle").attr("class","mr").attr("r",d=>d.r).attr("fill","rgba(0,0,0,.08)").attr("stroke",d=>gclr(gch(d))).attr("stroke-width",2.5).style("filter",d=>gglw(gch(d)));
  node.append("image").attr("href",d=>d.logo||"").attr("x",d=>-d.r*.91).attr("y",d=>-d.r*.91).attr("width",d=>d.r*1.82).attr("height",d=>d.r*1.82).attr("clip-path",(d,i)=>"url(#cp"+i+")").attr("preserveAspectRatio","xMidYMid slice").style("opacity",.82);
  node.append("circle").attr("r",d=>d.r*.91).attr("fill",(d,i)=>"url(#rg"+i+")").style("pointer-events","none");
  node.append("circle").attr("r",d=>d.r*.91).attr("fill",(d,i)=>"url(#hl"+i+")").style("pointer-events","none");
  node.append("circle").attr("r",d=>d.r*.48).attr("fill","rgba(255,255,255,0.13)").attr("stroke","rgba(255,255,255,0.05)").attr("stroke-width",1).style("pointer-events","none");

  node.each(function(t){
    const g=d3.select(this);
    const ch=gch(t);
    const pct=(ch>0?"+":"")+ch.toFixed(2)+"%";
    const clr=ch>=0?"#00FF66":"#FF2255";
    const glw=ch>=0?"0 0 18px rgba(0,255,102,.95),0 0 5px rgba(0,0,0,1)":"0 0 18px rgba(255,34,85,.95),0 0 5px rgba(0,0,0,1)";
    const shd="0 0 12px rgba(0,0,0,1),0 0 24px rgba(0,0,0,1),0 2px 4px rgba(0,0,0,1)";
    if(t.r>56){
      g.append("text").attr("dy","-.1em").attr("text-anchor","middle").attr("dominant-baseline","middle").style("font-family","'Bebas Neue',sans-serif").style("font-size",Math.max(14,Math.min(28,t.r*.24))+"px").style("letter-spacing",".07em").style("fill","#FFFFFF").style("text-shadow",shd).style("pointer-events","none").text(t.ticker);
      g.append("text").attr("dy","1.15em").attr("text-anchor","middle").attr("dominant-baseline","middle").style("font-family","'Bebas Neue',sans-serif").style("font-size",Math.max(11,Math.min(22,t.r*.19))+"px").style("letter-spacing",".05em").style("fill",clr).style("text-shadow",glw).style("pointer-events","none").text(pct);
    } else if(t.r>38){
      g.append("text").attr("dy","-.15em").attr("text-anchor","middle").attr("dominant-baseline","middle").style("font-family","'Bebas Neue',sans-serif").style("font-size",Math.max(11,Math.min(17,t.r*.25))+"px").style("fill","#FFFFFF").style("text-shadow",shd).style("pointer-events","none").text(t.ticker);
      g.append("text").attr("dy","1.0em").attr("text-anchor","middle").attr("dominant-baseline","middle").style("font-family","'Bebas Neue',sans-serif").style("font-size",Math.max(9,Math.min(14,t.r*.21))+"px").style("fill",clr).style("text-shadow",glw).style("pointer-events","none").text(pct);
    } else {
      g.append("text").attr("dy","0").attr("text-anchor","middle").attr("dominant-baseline","middle").style("font-family","'Bebas Neue',sans-serif").style("font-size",Math.max(9,Math.min(13,t.r*.3))+"px").style("fill","#FFFFFF").style("text-shadow",shd).style("pointer-events","none").text(t.ticker);
    }
  });

  node.on("mouseenter",function(e,t){
    d3.select(this).select(".mr").attr("stroke","#FFFFFF").style("filter","drop-shadow(0 0 38px rgba(255,255,255,.8)) drop-shadow(0 0 90px rgba(0,255,102,.45))");
    d3.select(this).select(".pr").style("opacity",.42);
  }).on("mouseleave",function(e,t){
    d3.select(this).select(".mr").attr("stroke",gclr(gch(t))).style("filter",gglw(gch(t)));
    d3.select(this).select(".pr").style("opacity",.18);
  }).on("click",function(e,t){ e.stopPropagation(); selId=t.pairId; updSR(); renderSide(); });
}

const updSR=()=>{ if(node) node.select(".sr").style("opacity",d=>d.pairId===selId?1:0); };

function renderTopRank(){
  const container=document.getElementById('topRank');
  if(!container) return;
  const ranked=tokens.slice().sort((a,b)=>b.rankScore-a.rankScore).slice(0,5);
  container.innerHTML=ranked.map((t,i)=>{
    const ch=gch(t); const pos=ch>=0;
    return `<div class="rp-pill${t.pairId===selId?' on':''}" data-pid="${t.pairId}"><span class="rp-num">#${i+1}</span><span class="rp-tk">$${t.ticker}</span><span class="rp-ch ${pos?'pos':'neg'}">${pos?'+':''}${ch.toFixed(1)}%</span></div>`;
  }).join("");
  container.querySelectorAll('.rp-pill').forEach(el=>el.addEventListener('click',()=>{ selId=el.dataset.pid; updSR(); renderSide(); }));
}

function renderSide(){
  renderTopRank();
  if(document.getElementById('caV')) document.getElementById('caV').textContent = (tokens.find(t=>t.pairId===selId)||tokens[0])?.tokenMint||'';
}

function renderStats(){
  // not used on mobile, but keep for desktop
}

document.querySelectorAll('.pbtn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); period=btn.dataset.p;
  calcR(); runSim(); renderNodes(); updSR(); renderSide();
}));

async function hydrate(){
  const disc=await loadTokens();
  tokens=disc;
  if(!tokens.length){ setSt("⚠️ No coins found"); hideLoader(); return; }
  selId=tokens[0].pairId;
  adjVP(); W=cont.clientWidth; H=cont.clientHeight; mouse={x:W/2,y:H/2};
  calcR(); runSim(); renderNodes(); updSR(); renderSide();
  hideLoader();
}

function animate(){
  tokens.forEach(t=>{
    t.vx+=(mouse.x-t.x)*STR; t.vy+=(mouse.y-t.y)*STR;
    t.x+=t.vx; t.y+=t.vy; t.vx*=.984; t.vy*=.984;
    if(t.x-t.r<0){t.x=t.r;t.vx*=-.82} if(t.x+t.r>W){t.x=W-t.r;t.vx*=-.82}
    if(t.y-t.r<0){t.y=t.r;t.vy*=-.82} if(t.y+t.r>H){t.y=H-t.r;t.vy*=-.82}
  });
  for(let i=0;i<tokens.length;i++){
    for(let j=i+1;j<tokens.length;j++){
      const a=tokens[i],b=tokens[j],dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy)||.001,minD=a.r+b.r+pad;
      if(dist<minD){ const ov=(minD-dist)/2,nx=dx/dist,ny=dy/dist; a.x-=nx*ov;a.y-=ny*ov;b.x+=nx*ov;b.y+=ny*ov; const dot=(a.vx-b.vx)*nx+(a.vy-b.vy)*ny; if(dot>0){const k=dot*.46;a.vx-=k*nx;a.vy-=k*ny;b.vx+=k*nx;b.vy+=k*ny;} }
    }
  }
  if(node) node.attr("transform",d=>"translate("+d.x+","+d.y+")");
  requestAnimationFrame(animate);
}

svg.on("mousemove",e=>{ const[px,py]=d3.pointer(e); mouse.x=px; mouse.y=py; });
svg.on("click",()=>{ if(tokens[0]){ selId=tokens[0].pairId; updSR(); renderSide(); } });
window.addEventListener("resize",()=>{ adjVP(); W=cont.clientWidth; H=cont.clientHeight; calcR(); runSim(); renderNodes(); updSR(); renderSide(); });
if("ResizeObserver" in window) new ResizeObserver(()=>{ W=cont.clientWidth; H=cont.clientHeight; calcR(); runSim(); renderNodes(); updSR(); }).observe(cont);

setTimeout(hideLoader, 15000);

await hydrate();
animate();
setInterval(hydrate,60000);
})();
</script>
